<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIP Taklifnoma</title>

<style>
body {
  margin:0;
  font-family: sans-serif;
  color:white;
  text-align:center;
}

section {
  width: 100%;
  height: 100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* VIDEO */
#bgvideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* BUTTON */
button {
  padding:10px 20px;
  border:none;
  border-radius:10px;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>
<!-- VIDEO -->
<video autoplay muted loop id="bgvideo">
  <source src="VIDEO_LINK.mp4" type="video/mp4">
</video>

<!-- AUDIO -->
<audio id="mymusic" loop>
  <source src="music.mp3" type="audio/mpeg">
  Sizning brauzeringiz audio tagini qo‘llab-quvvatlamaydi.
</audio>

<!-- Foydalanuvchi interaktsiyasi bo'lmasa, desktopda avtomatik urinish -->
<script>
  const audio = document.getElementById('mymusic');

  // Sahifa yuklanganda urinish
  window.addEventListener('load', () => {
    const playPromise = audio.play();
    if (playPromise !== undefined) {
      playPromise.catch(error => {
        console.log('Autoplay audio bloklandi, foydalanuvchi bosishi kerak');
      });
    }
  });

  // Sahifada biror tugmani bosganda, audio ishga tushadi
  document.body.addEventListener('click', () => {
    audio.play();
  });
</script>
