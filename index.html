<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">    
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Komil & ??? vip taklifnoma</title>

<!-- Google Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Roboto&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family: 'Roboto', sans-serif;
  color:white;
  overflow-y: scroll;
  scroll-behavior: smooth;
}

/* Scroll Snap container */
main {
  height: 100vh;
  scroll-snap-type: y mandatory;
  overflow-y: scroll;
}

/* Slaydlar */
section {
  width: 100%;
  height: 100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  scroll-snap-align: start;
  padding:20px;
  box-sizing:border-box;
  text-align:center;
  position:relative;
  transition: all 1s ease;
  overflow:hidden;
}

/* Video slayd */
#slide1 {
  position: relative;
}
#bgvideo {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

/* Slide text */
.slide-text {
  font-family: 'Playfair Display', serif;
  font-size:4vw;
  font-weight:700;
  text-shadow: 2px 2px 10px rgba(0,0,0,0.7);
  opacity:0;
  transform: translateY(50px);
  animation: fadeInUp 1s forwards;
  animation-delay: 0.5s;
}

/* Animatsiya */
@keyframes fadeInUp {
  to {
    opacity:1;
    transform: translateY(0);
  }
}

/* Keyingi slaydlar dizayn */
.slide2 {
  background: photo_fon2.jpg
}
.slide3 {
  background: photo_fon3.jpg
}
.slide4 {
  background: photo_fon4.jpg 
}
.slide5 {
  background: photo_fon5.jpg 
}

/* Buttons */
button {
  padding:10px 25px;
  border:none;
  border-radius:15px;
  margin-top:20px;
  cursor:pointer;
  font-size:1.2rem;
  background: rgba(0,0,0,0.6);
  color:white;
  transition: all 0.3s ease;
}
button:hover {
  background: rgba(0,0,0,0.8);
}

/* Images */
section img {
  max-width:80%;
  border-radius:15px;
  margin-top:20px;
  opacity:0;
  transform: scale(0.8);
  animation: fadeIn 1s forwards;
  animation-delay: 1s;
}
@keyframes fadeIn {
  to {
    opacity:1;
    transform: scale(1);
  }
}
</style>
</head>

<body>

<!-- AUDIO -->
<audio id="mymusic" loop>
  <source src="music.mp3" type="audio/mpeg">
  Sizning brauzeringiz audio tagini qo‘llab-quvvatlamaydi.
</audio>

<script>
const audio = document.getElementById('mymusic');
// Desktop: sahifa yuklanganda urinish
window.addEventListener('load', () => {
  const playPromise = audio.play();
  if (playPromise !== undefined) {
    playPromise.catch(error => console.log('Autoplay audio bloklandi, foydalanuvchi bosishi kerak'));
  }
});
// Foydalanuvchi bosganda ishlaydi (mobil)
document.body.addEventListener('click', () => {
  audio.play();
});
</script>

<main>
  <!-- 1-SLAYD -->
  <section id="slide1">
    <video autoplay muted loop id="bgvideo">
      <source src="video_fon1.mp4" type="video/mp4">
    </video>
    <div class="slide-text">
   
    </div>
  </section>

  <!-- 2-SLAYD (Kalendar) -->
  <section class="slide2">
    <h2 class="slide-text">📅 To‘y kuni</h2>  
    <h2 class="slide-text">25 Aprel 2026</h2>
  </section>

  <!-- 3-SLAYD (Xarita) -->
  <section class="slide3">
    <h2 class="slide-text">📍 Manzil: Sho'rchi tumani Ideal SS to'yxonasi</h2>
    <img src="RASM.jpg" alt="To'y manzili">
    <iframe src="https://maps.app.goo.gl/WePAs1Uw9MXWhNPZ6" width="300" height="200"></iframe>
  </section>

  <!-- 4-SLAYD (Mehmonlar) -->
  <section class="slide4">
    <h2 class="slide-text">Ikki daryo tutashsa - ummon boʻladi,<br>
    ikki qalb birlashsa jahon boʻladi.<br>
    Bizning kichik jahonimiz poydevori qoʻyilayotgan kunda mehmonimiz boʻling</h2>
    <img src="RASMLINK.jpg" alt="To'y rasmi">
  </section>

  <!-- 5-SLAYD (Kelishni tasdiqlash) -->
  <section class="slide5">
    <h2 class="slide-text">Sizni kutamiz!</h2>
    <button onclick="alert('Kelaman')">✅ Kelaman</button>
  </section>
</main>

</body>
</html>
